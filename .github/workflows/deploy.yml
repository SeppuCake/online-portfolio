name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # ⬆️ updated

      - name: Setup Node
        uses: actions/setup-node@v4  # ⬆️ updated
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4  # ⬆️ updated
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
